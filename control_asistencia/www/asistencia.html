{% extends "templates/web.html" %}

{% block title %}Asistencia{% endblock %}

{% block header %}
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Asistencia">
<meta name="theme-color" content="#1e293b">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/assets/control_asistencia/manifest.json">
<link rel="apple-touch-icon" href="/assets/control_asistencia/pwa-icon-192.png">
{% endblock %}

{% block page_content %}
<div class="asistencia-mobile-container" id="am-app">
    <div class="am-loading">Cargando perfil y estado...</div>
</div>
{% endblock %}

{% block style %}

    .am-install-btn {

    }

    }

    }

    }

        font-size: 14px;

    .am-refresh-btn {

    }

    .am-desk-btn {

    }
    .am-logout-btn {

    .am-actions {

    .am-form-card,

    }
    .am-card-title {
        font-size: 17px;
        font-weight: 800;
        margin: 0 0 14px 0;
        color: #1e293b;
    }
    .am-field {
        margin-bottom: 12px;
    }
    .am-field label {
        display: block;
        font-size: 12px;
        font-weight: 800;

        text-transform: uppercase;

    }

        display: flex;
        justify-content: center;

    /* Overlay over web navbar to make it clean if web navbar exists */

    }
    footer {
        display: none !important;

</style>

{% block script %}
<script>
let deferredInstallPrompt = null;
let pwaInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

window.addEventListener('beforeinstallprompt', function(event) {
    event.preventDefault();
    deferredInstallPrompt = event;
    $('#am-install-app').addClass('am-install-visible');
});

window.addEventListener('appinstalled', function() {
    deferredInstallPrompt = null;
    pwaInstalled = true;
    $('#am-install-app').removeClass('am-install-visible');
});

if ('serviceWorker' in navigator) {
    const registerAsistenciaServiceWorker = function() {
        navigator.serviceWorker.register('/asistencia-sw.js', { scope: '/' }).catch(function(err) {
            console.error('No se pudo registrar el service worker de asistencia:', err);
        });
    };
    if (document.readyState === 'complete') {
        registerAsistenciaServiceWorker();
    } else {
        window.addEventListener('load', registerAsistenciaServiceWorker);
    }
}

frappe.ready(function() {
    let profile = null;
    let locationDist = null;
    let currentLocation = null;
    let isCheckingLoc = false;
    let locErrorMsg = null;
    let savingLog = false;
    let activeTab = 'attendance';
    let leaveTypes = [];
    let leaveApplications = [];
    let shiftTypes = [];
    let shiftRequests = [];
    let savingLeave = false;
    let cancellingLeave = null;

    function esc(value) {
        return $('<div>').text(value == null ? '' : String(value)).html();
    }

    function leaveStatusLabel(status) {
        const labels = {
            Open: 'Pendiente',
            Approved: 'Aprobada',
            Rejected: 'Rechazada',
            Cancelled: 'Cancelada'
        };
        return labels[status] || status || '';
    }

    function todayLocalISO() {
        const d = new Date();
        d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
        return d.toISOString().slice(0, 10);
    }

    function render() {
        if (!profile) return;

        const app = $('#am-app');

        if (profile.not_employee) {
            app.html(
                '<div class="am-message-view">' +
                '    <div class="am-message-card">' +
                '        <h1 class="am-message-title">Usuario logueado no es empleado</h1>' +
                '        <div class="am-message-actions">' +
                '            <button class="am-nav-btn am-desk-btn" id="am-btn-desk" type="button">Ir al Desk</button>' +
                '            <button class="am-nav-btn am-logout-btn" id="am-btn-logout" type="button">Cerrar sesion</button>' +
                '        </div>' +
                '    </div>' +
                '</div>'
            );
            $('#am-btn-desk').on('click', function() {
                window.location.href = '/app';
            });
            $('#am-btn-logout').on('click', function() {
                window.location.href = '/?cmd=web_logout';
            });
            return;
        }

        const allowed_dist = profile.max_distance || 20;
        const hasCoordinates = !!(profile.branch_lat && profile.branch_lng);
        const canAction = !profile.require_geolocation || (hasCoordinates && locationDist !== null && locationDist <= allowed_dist);
        const status = profile.last_log_type === 'IN' ? 'checked-in' : 'checked-out';

        let locHtml = '';
        if (profile.require_geolocation) {
            if (locErrorMsg) {
                locHtml = '<p class="am-error-text">' + locErrorMsg + '</p>';
            } else if (!hasCoordinates) {
                locHtml = '<p class="am-error-text">Tu sucursal no tiene coordenadas de geolocalización configuradas o no tienes sucursal asignada.</p>';
            } else if (isCheckingLoc) {
                locHtml = '<p class="am-info-text">Obteniendo ubicación actual...</p>';
            } else if (locationDist !== null) {
                let distClass = !canAction ? 'am-text-red' : '';
                locHtml = 
                    '<div class="am-distance-container">' +
                    '    <p class="am-distance-label">Distancia actual a la sucursal:</p>' +
                    '    <p class="am-distance-value ' + distClass + '">' + locationDist + ' metros</p>';
                if (!canAction) {
                    locHtml += '    <p class="am-warning-text">Debes acercarte a menos de ' + allowed_dist + 'm para registrarte.</p>';
                }
                locHtml += '</div>';
            } else {
                locHtml = '<p class="am-info-text">Esperando ubicación...</p>';
            }
            if (hasCoordinates) {
                locHtml += '<button class="am-refresh-btn" id="am-btn-refresh">Actualizar Ubicación</button>';
            }
        }

        const inDisabled = !canAction || status === 'checked-in' || savingLog || isCheckingLoc;
        const outDisabled = !canAction || status === 'checked-out' || savingLog || isCheckingLoc;

        const employeeName = esc(profile.employee_name || 'Empleado');
        const branchName = esc(profile.branch || 'Sin sucursal');
        const statusDot = status === 'checked-in' ? 'am-dot-green' : 'am-dot-gray';
        const statusLabel = status === 'checked-in' ? 'Turno Activo (Check-IN)' : 'Esperando Check-IN';
        const inStr = (savingLog && profile._attemptAction === 'IN') ? 'Guardando...' : 'Check IN';
        const outStr = (savingLog && profile._attemptAction === 'OUT') ? 'Guardando...' : 'Check OUT';

        let html = 
            '<div class="am-header">' +
            '    <div class="am-title-row">' +
            '        <h1 class="am-title">Marcar Asistencia</h1>' +
            '        <div style="display:flex; gap:8px;">' +
            '            <button class="am-install-btn ' + (deferredInstallPrompt && !pwaInstalled ? 'am-install-visible' : '') + '" id="am-install-app" type="button">Instalar</button>' +
            (profile.show_desk_btn ? '            <button class="am-header-desk-btn" id="am-header-desk" type="button">Ir a Desk</button>' : '') +
            '            <button class="am-header-logout-btn" id="am-header-logout" type="button">Salir</button>' +
            '        </div>' +
            '    </div>' +
            '    <p class="am-greeting">Hola, ' + employeeName + '</p>' +
            '    <div class="am-branch-container">' +
            '        <p class="am-branch-label">Sucursal Asignada</p>' +
            '        <p class="am-branch-text">' + branchName + '</p>' +
            '        <div style="margin-top: 12px;">' +
            '            <p class="am-branch-label">Turno de Hoy</p>' +
            '            <p class="am-branch-text">' + (profile.current_shift || 'Sin turno asignado hoy') + '</p>' +
            '        </div>' +
            '    </div>' +
            '</div>' +
            '<div class="am-tabs">' +
            '    <button class="am-tab ' + (activeTab === 'attendance' ? 'am-tab-active' : '') + '" id="am-tab-attendance">Asistencia</button>' +
            '    <button class="am-tab ' + (activeTab === 'leave' ? 'am-tab-active' : '') + '" id="am-tab-leave">Permisos</button>' +
            '    <button class="am-tab ' + (activeTab === 'shift' ? 'am-tab-active' : '') + '" id="am-tab-shift">Turnos</button>' +
            '</div>';

        if (activeTab === 'attendance') {
            html +=
                '<div class="am-content">' +
                '    <div class="am-status-card am-pulse">' +
                '        <div class="am-indicator-container">' +
                '            <div class="am-dot ' + statusDot + '"></div>' +
                '            <h2 class="am-status-text">' + statusLabel + '</h2>' +
                '        </div>';
        
            if (profile.require_geolocation) {
                html += '<div class="am-divider"></div>' + locHtml;
            }

            html +=
                '    </div>' +
                '    <div class="am-actions">' +
                '        <button class="am-btn-action am-btn-in ' + (inDisabled ? 'am-btn-disabled' : '') + '" id="am-btn-in" ' + (inDisabled ? 'disabled' : '') + '>' + inStr + '</button>' +
                '        <button class="am-btn-action am-btn-out ' + (outDisabled ? 'am-btn-disabled' : '') + '" id="am-btn-out" ' + (outDisabled ? 'disabled' : '') + '>' + outStr + '</button>' +
                '    </div>' +
                '</div>';
        } else if (activeTab === 'leave') {
            const leaveOptions = leaveTypes.map(function(t) {
                return '<option value="' + esc(t.name) + '">' + esc(t.name) + '</option>';
            }).join('');
            let rows = '';
            if (!leaveApplications.length) {
                rows = '<p class="am-info-text">No tienes solicitudes registradas.</p>';
            } else {
                rows = leaveApplications.map(function(lv) {
                    const statusClass = 'am-status-' + String(lv.status || '').toLowerCase();
                    let cancelBtn = '';
                    if (lv.can_cancel) {
                        const cancelText = cancellingLeave === lv.name ? 'Cancelando...' : 'Cancelar solicitud';
                        cancelBtn = '<button class="am-cancel-btn" data-leave-name="' + esc(lv.name) + '" ' + (cancellingLeave ? 'disabled' : '') + '>' + cancelText + '</button>';
                    }
                    return '<div class="am-leave-row">' +
                        '<div class="am-leave-head">' +
                        '<div>' +
                        '<p class="am-leave-type">' + esc(lv.leave_type) + '</p>' +
                        '<p class="am-leave-dates">' + esc(lv.from_date) + ' a ' + esc(lv.to_date) + (lv.half_day ? ' - medio dia' : '') + '</p>' +
                        '</div>' +
                        '<span class="am-status-pill ' + statusClass + '">' + esc(leaveStatusLabel(lv.status)) + '</span>' +
                        '</div>' +
                        (lv.description ? '<p class="am-info-text" style="margin-top:8px;">' + esc(lv.description) + '</p>' : '') +
                        cancelBtn +
                        '</div>';
                }).join('');
            }

            html +=
                '<div class="am-content am-leave-content">' +
                '    <div class="am-form-card">' +
                '        <h2 class="am-card-title">Solicitar vacaciones</h2>' +
                '        <div class="am-field"><label>Tipo</label><select id="am-leave-type">' + leaveOptions + '</select></div>' +
                '        <div class="am-field"><label>Desde</label><input type="date" id="am-from-date"></div>' +
                '        <div class="am-field"><label>Hasta</label><input type="date" id="am-to-date"></div>' +
                '        <label class="am-check-row"><input type="checkbox" id="am-half-day"> Medio dia</label>' +
                '        <div class="am-field"><label>Comentario</label><textarea id="am-description" placeholder="Opcional"></textarea></div>' +
                '        <button class="am-submit-btn ' + (savingLeave ? 'am-btn-disabled' : '') + '" id="am-submit-leave" ' + (savingLeave ? 'disabled' : '') + '>' + (savingLeave ? 'Enviando...' : 'Enviar solicitud') + '</button>' +
                '    </div>' +
                '    <div class="am-list-card">' +
                '        <h2 class="am-card-title">Mis permisos</h2>' +
                         rows +
                '    </div>' +
                '</div>';
        } else if (activeTab === 'shift') {
            const shiftOptions = shiftTypes.map(function(t) {
                return '<option value="' + esc(t.name) + '">' + esc(t.name) + '</option>';
            }).join('');
            
            let shiftRows = '';
            if (!shiftRequests.length) {
                shiftRows = '<p class="am-info-text">No tienes solicitudes de turno registradas.</p>';
            } else {
                shiftRows = shiftRequests.map(function(sr) {
                    const statusClass = 'am-status-' + String(sr.status || '').toLowerCase();
                    return '<div class="am-leave-row">' +
                        '<div class="am-leave-head">' +
                        '<div>' +
                        '<p class="am-leave-type">' + esc(sr.shift_type) + '</p>' +
                        '<p class="am-leave-dates">' + esc(sr.from_date) + ' a ' + esc(sr.to_date) + '</p>' +
                        '</div>' +
                        '<span class="am-status-pill ' + statusClass + '">' + esc(leaveStatusLabel(sr.status)) + '</span>' +
                        '</div>' +
                        '</div>';
                }).join('');
            }

            html +=
                '<div class="am-content am-leave-content">' +
                '    <div class="am-form-card">' +
                '        <h2 class="am-card-title">Solicitar Cambio de Turno</h2>' +
                '        <div class="am-field"><label>Turno</label><select id="am-shift-type"><option value="">-- Seleccionar --</option>' + shiftOptions + '<option value="Otro">Otro (No existe)</option></select></div>' +
                '        <div class="am-field" id="am-shift-custom-row" style="display:none;"><label>Detalles del Turno Solicitado (Horarios y Días aplicables)</label><textarea id="am-shift-custom" placeholder="Ej: Lunes a Jueves de 8am a 4pm..."></textarea></div>' +
                '        <div class="am-field"><label>Desde</label><input type="date" id="am-shift-from-date"></div>' +
                '        <div class="am-field"><label>Hasta</label><input type="date" id="am-shift-to-date"></div>' +
                '        <button class="am-submit-btn ' + (savingLeave ? 'am-btn-disabled' : '') + '" id="am-submit-shift" ' + (savingLeave ? 'disabled' : '') + '>' + (savingLeave ? 'Enviando...' : 'Enviar solicitud') + '</button>' +
                '    </div>' +
                '    <div class="am-list-card">' +
                '        <h2 class="am-card-title">Mis cambios de turno</h2>' +
                         shiftRows +
                '    </div>' +
                '</div>';
        }

        app.html(html);

        $('#am-tab-attendance').on('click', function() { activeTab = 'attendance'; render(); });
        $('#am-tab-leave').on('click', function() { activeTab = 'leave'; render(); loadLeaveData(); });
        $('#am-tab-shift').on('click', function() { activeTab = 'shift'; render(); loadShiftData(); });
        $('#am-install-app').on('click', installPWA);
        $('#am-header-logout').on('click', function() {
            window.location.href = '/?cmd=web_logout';
        });
        if (profile.show_desk_btn) {
            $('#am-header-desk').on('click', function() {
                window.location.href = '/app';
            });
        }
        $('#am-btn-refresh').on('click', checkLocation);
        $('#am-btn-in').on('click', function() { handleLog('IN'); });
        $('#am-btn-out').on('click', function() { handleLog('OUT'); });
        $('#am-submit-leave').on('click', submitLeaveRequest);
        $('#am-submit-shift').on('click', submitShiftRequest);
        
        $('#am-shift-type').on('change', function() {
            if ($(this).val() === 'Otro') {
                $('#am-shift-custom-row').show();
            } else {
                $('#am-shift-custom-row').hide();
            }
        });

        $('.am-cancel-btn').on('click', function() {
            cancelLeaveRequest($(this).data('leave-name'));
        });
        if (activeTab === 'leave') {
            const today = todayLocalISO();
            $('#am-from-date').val(today);
            $('#am-to-date').val(today);
        } else if (activeTab === 'shift') {
            const today = todayLocalISO();
            $('#am-shift-from-date').val(today);
            $('#am-shift-to-date').val(today);
        }
    }

    function installPWA() {
        if (!deferredInstallPrompt) return;

        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.finally(function() {
            deferredInstallPrompt = null;
            render();
        });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const p1 = lat1 * Math.PI / 180;
        const p2 = lat2 * Math.PI / 180;
        const dp = (lat2 - lat1) * Math.PI / 180;
        const dl = (lon2 - lon1) * Math.PI / 180;

        const a = Math.sin(dp / 2) * Math.sin(dp / 2) +
                  Math.cos(p1) * Math.cos(p2) *
                  Math.sin(dl / 2) * Math.sin(dl / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

        return Math.round(R * c);
    }

    function checkLocation() {
        if (!profile || !profile.require_geolocation) return;
        isCheckingLoc = true;
        locErrorMsg = null;
        render();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                currentLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                if (profile.branch_lat && profile.branch_lng) {
                    locationDist = getDistance(pos.coords.latitude, pos.coords.longitude, profile.branch_lat, profile.branch_lng);
                } else {
                    locationDist = null;
                }
                isCheckingLoc = false;
                render();
            }, function(err) {
                isCheckingLoc = false;
                locErrorMsg = err.message || 'Error al obtener la ubicación GPS.';
                locationDist = null;
                render();
            }, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            isCheckingLoc = false;
            locErrorMsg = "Geolocalización no soportada por su navegador.";
            render();
        }
    }

    function handleLog(actionType) {
        if (savingLog) return;
        
        // Helper para obtener cookies
        function getCookie(name) {
            let match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) return match[2];
            return null;
        }

        // Helper para establecer cookies de larga duración (10 años)
        function setCookie(name, value) {
            let date = new Date();
            date.setTime(date.getTime() + (10 * 365 * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + value + "; expires=" + date.toUTCString() + "; path=/; Secure; SameSite=Lax";
        }

        let deviceId = localStorage.getItem('attendance_device_id') || getCookie('attendance_device_id');
        if (!deviceId) {
            deviceId = frappe.utils.get_random(20);
        }
        localStorage.setItem('attendance_device_id', deviceId);
        setCookie('attendance_device_id', deviceId);

        savingLog = true;
        profile._attemptAction = actionType;
        render();

        frappe.call({
            method: 'control_asistencia.control_asistencia.shift_panel.record_mobile_checkin',
            args: {
                log_type: actionType,
                latitude: currentLocation ? currentLocation.lat : null,
                longitude: currentLocation ? currentLocation.lng : null,
                device_id: deviceId
            },
            callback: function(r) {
                savingLog = false;
                if (!r.exc && r.message) {
                    frappe.show_alert({
                        message: 'Marcación de ' + (actionType === 'IN' ? 'Entrada' : 'Salida') + ' exitosa', 
                        indicator: 'green'
                    });
                    profile.last_log_type = actionType;
                    render();
                } else {
                    let errMsg = 'Hubo un error al registrar la marcación.';
                    if (r._server_messages) {
                        try {
                            const msgs = JSON.parse(r._server_messages);
                            if (msgs.length > 0) {
                                errMsg = JSON.parse(msgs[0]).message.replace(/<[^>]+>/g, '');
                            }
                        } catch(e){}
                    }
                    frappe.msgprint({title: 'Error de Marcación', message: errMsg, indicator: 'red'});
                    render();
                }
            },
            error: function() {
                savingLog = false;
                render();
            }
        });
    }

    function loadLeaveData() {
        frappe.call({
            method: 'control_asistencia.control_asistencia.shift_panel.get_leave_type_options',
            callback: function(r) {
                leaveTypes = r.message || [];
                frappe.call({
                    method: 'control_asistencia.control_asistencia.shift_panel.get_my_leave_applications',
                    callback: function(res) {
                        leaveApplications = res.message || [];
                        if (activeTab === 'leave') render();
                    }
                });
            }
        });
    }

    function submitLeaveRequest() {
        if (savingLeave) return;

        const leaveType = $('#am-leave-type').val();
        const fromDate = $('#am-from-date').val();
        const toDate = $('#am-to-date').val();
        const halfDay = $('#am-half-day').is(':checked') ? 1 : 0;
        const description = $('#am-description').val() || '';

        if (!leaveType || !fromDate || !toDate) {
            frappe.msgprint({ title: 'Datos incompletos', message: 'Selecciona tipo, fecha inicial y fecha final.', indicator: 'orange' });
            return;
        }

        savingLeave = true;
        render();

        frappe.call({
            method: 'control_asistencia.control_asistencia.shift_panel.request_mobile_leave',
            args: {
                leave_type: leaveType,
                from_date: fromDate,
                to_date: toDate,
                half_day: halfDay,
                half_day_date: halfDay ? fromDate : null,
                description: description
            },
            callback: function(r) {
                savingLeave = false;
                if (!r.exc && r.message) {
                    frappe.show_alert({ message: 'Solicitud enviada para aprobacion.', indicator: 'green' });
                    loadLeaveData();
                } else {
                    render();
                }
            },
            error: function() {
                savingLeave = false;
                render();
            }
        });
    }

    function loadShiftData() {
        frappe.call({
            method: 'control_asistencia.control_asistencia.shift_panel.get_shift_types_options',
            callback: function(r) {
                shiftTypes = r.message || [];
                frappe.call({
                    method: 'control_asistencia.control_asistencia.shift_panel.get_my_shift_requests',
                    callback: function(res) {
                        shiftRequests = res.message || [];
                        if (activeTab === 'shift') render();
                    }
                });
            }
        });
    }

    function submitShiftRequest() {
        if (savingLeave) return;

        const shiftType = $('#am-shift-type').val();
        const customDetails = $('#am-shift-custom').val() || '';
        const fromDate = $('#am-shift-from-date').val();
        const toDate = $('#am-shift-to-date').val();

        if (!shiftType || !fromDate || !toDate) {
            frappe.msgprint({ title: 'Datos incompletos', message: 'Selecciona tipo de turno, fecha inicial y fecha final.', indicator: 'orange' });
            return;
        }
        
        if (shiftType === 'Otro' && !customDetails) {
            frappe.msgprint({ title: 'Datos incompletos', message: 'Escribe los detalles del turno solicitado.', indicator: 'orange' });
            return;
        }

        savingLeave = true;
        render();

        frappe.call({
            method: 'control_asistencia.control_asistencia.shift_panel.request_mobile_shift_change',
            args: {
                shift_type: shiftType,
                custom_details: customDetails,
                from_date: fromDate,
                to_date: toDate
            },
            callback: function(r) {
                savingLeave = false;
                if (!r.exc && r.message) {
                    frappe.show_alert({ message: 'Solicitud enviada para aprobacion.', indicator: 'green' });
                    loadShiftData();
                } else {
                    render();
                }
            },
            error: function() {
                savingLeave = false;
                render();
            }
        });
    }

    function cancelLeaveRequest(leaveName) {
        if (!leaveName || cancellingLeave) return;
        frappe.confirm('Cancelar esta solicitud pendiente?', function() {
            cancellingLeave = leaveName;
            render();
            frappe.call({
                method: 'control_asistencia.control_asistencia.shift_panel.cancel_mobile_leave',
                args: { leave_name: leaveName },
                callback: function(r) {
                    cancellingLeave = null;
                    if (!r.exc) {
                        frappe.show_alert({ message: 'Solicitud cancelada.', indicator: 'red' });
                        loadLeaveData();
                    } else {
                        render();
                    }
                },
                error: function() {
                    cancellingLeave = null;
                    render();
                }
            });
        });
    }

    frappe.call({
        method: 'control_asistencia.control_asistencia.shift_panel.get_mobile_profile',
        callback: function(r) {
            if (r.message && r.message.redirect_to_login) {
                window.location.href = '/login?redirect-to=/asistencia';
                return;
            }
            if (r.message) {
                profile = r.message;
                render();
                if (!profile.not_employee) {
                    loadLeaveData();
                }
                if (profile.require_geolocation) {
                    checkLocation();
                }
            } else {
                $('#am-app').html(
                    '<div style="flex:1; display:flex; justify-content:center; align-items:center; padding:40px;">' +
                    '    <span class="am-error-text">No se pudo cargar el perfil del empleado o su sesión ha expirado.</span>' +
                    '</div>'
                );
            }
        }
    });

    // Refrescar perfil cuando el usuario regresa a la app (muy útil en móviles)
    document.addEventListener("visibilitychange", function() {
        if (!document.hidden && profile && !profile.not_employee) {
            frappe.call({
                method: 'control_asistencia.control_asistencia.shift_panel.get_mobile_profile',
                callback: function(r) {
                    if (r.message && r.message.redirect_to_login) {
                        window.location.href = '/login?redirect-to=/asistencia';
                        return;
                    }
                    if (r.message) {
                        profile = r.message;
                        render();
                        if (profile.require_geolocation) {
                            checkLocation();
                        }
                    }
                }
            });
        }
    });

    // Escuchar eventos en tiempo real si el socket está conectado
    if (window.frappe && frappe.realtime) {
        frappe.realtime.on('update_max_distance', function(distance) {
            if (profile) {
                profile.max_distance = parseFloat(distance);
                render();
                if (profile.require_geolocation) {
                    checkLocation();
                }
            }
        });
    }
});
</script>
{% endblock %}
